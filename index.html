<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Island Event</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0;
    background: #0e1116;
    color: #e6edf3;
    min-height: 100vh;
  }
  .container {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 16px;
    padding: 16px;
    min-height: 100vh;
  }
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
  }
  .pane {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 18px;
    overflow: hidden;
  }
  .pane h2 {
    margin: 0 0 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #8b949e;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tts-controls { display: flex; gap: 8px; align-items: center; font-size: 11px; }
  .tts-controls label { color: #8b949e; cursor: pointer; }
  .tts-controls input[type=checkbox] { vertical-align: middle; }
  .tts-controls select {
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e6edf3;
    border-radius: 4px;
    padding: 2px 4px;
    font-size: 11px;
    max-width: 140px;
  }

  .beat {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid #21262d;
  }
  .beat:last-of-type { border-bottom: none; }

  .segment {
    font-size: 16px;
    line-height: 1.65;
    margin-bottom: 10px;
    padding: 2px 0;
    color: #e6edf3;
    transition: background 0.15s;
    white-space: pre-wrap;
  }
  .segment:last-child { margin-bottom: 0; }
  .segment.speaking {
    background: rgba(88, 166, 255, 0.08);
  }

  .phone .player-name {
    color: #8b949e;
    margin-bottom: 14px;
    font-size: 13px;
    padding-bottom: 12px;
    border-bottom: 1px solid #21262d;
  }
  .phone .player-name strong { color: #e6edf3; }
  .phone .prompt {
    margin-bottom: 12px;
    color: #c9d1d9;
    font-size: 14px;
  }
  .phone input[type=text] {
    width: 100%;
    padding: 11px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 14px;
    font-family: inherit;
  }
  .phone input[type=text]:focus { outline: none; border-color: #58a6ff; }
  .phone .inventory {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .phone .item {
    padding: 11px 13px;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    background: #0d1117;
    font-size: 14px;
    transition: border-color 0.1s, background 0.1s;
  }
  .phone .item:hover { border-color: #58a6ff; }
  .phone .item.selected {
    border-color: #58a6ff;
    background: #1f3553;
  }
  .phone .actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }
  .phone button {
    padding: 11px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
  .phone button:hover:not(:disabled) { background: #2ea043; }
  .phone button.secondary { background: #30363d; }
  .phone button.secondary:hover:not(:disabled) { background: #424a53; }
  .phone button:disabled { opacity: 0.45; cursor: not-allowed; }
  .loading {
    color: #8b949e;
    font-style: italic;
    padding: 8px 0;
  }
  .error {
    color: #f85149;
    padding: 10px;
    border: 1px solid #f85149;
    border-radius: 6px;
    background: rgba(248, 81, 73, 0.08);
  }
  .outcome {
    padding: 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.5;
  }
  .outcome.outcome-1 { border-color: #2ea043; }
  .outcome.outcome-2 { border-color: #da3633; }
  .outcome.outcome-3 { border-color: #8b949e; }
  details.debug-wrap {
    margin-top: 24px;
    border-top: 1px solid #21262d;
    padding-top: 14px;
  }
  details.debug-wrap summary {
    cursor: pointer;
    color: #8b949e;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .debug {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: #8b949e;
    margin-top: 12px;
    padding: 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    white-space: pre-wrap;
    max-height: 320px;
    overflow: auto;
  }
</style>
</head>
<body>
<div class="container">
  <section class="pane host">
    <h2>
      <span>Host Screen</span>
      <span class="tts-controls">
        <select id="tts-mode" title="Audio mode">
          <option value="off">Audio: Off</option>
          <option value="browser">Audio: Browser</option>
          <option value="elevenlabs" selected>Audio: ElevenLabs ($)</option>
        </select>
      </span>
    </h2>
    <div id="beats"></div>
    <details class="debug-wrap">
      <summary>Storyteller messages (debug)</summary>
      <div id="debug" class="debug">(empty)</div>
    </details>
  </section>
  <section class="pane phone">
    <h2>Player's Phone</h2>
    <div class="player-name">Playing as: <strong id="player-name">Phyllis</strong></div>
    <div id="phone-content"></div>
  </section>
</div>

<script type="module">
// ============================================================
// Player (hardcoded)
// ============================================================
const PLAYER = {
  name: 'Phyllis',
  inventory: ['coconut', 'shiny rock', 'feather'],
  dominantAttribute: null, // none → dice roll on the return-item path
};

// ============================================================
// Event registry — add new events here.
// ============================================================
const EVENTS = [
  { id: 'king-krab', label: 'King Krab', path: './events/king-krab.js' },
  { id: 'sage',      label: 'The Sage',  path: './events/sage.js' },
];

// ============================================================
// Stage (event-agnostic harness)
// ============================================================
let event = null;
let EMIT_BEAT_TOOL = null;

function buildEmitBeatTool(allVoiceKeys) {
  return {
    name: 'emit_beat',
    description: 'Emit the next beat of the host-screen script as an ordered list of voice segments.',
    input_schema: {
      type: 'object',
      properties: {
        segments: {
          type: 'array',
          items: {
            type: 'object',
            properties: {
              voice: { type: 'string', enum: allVoiceKeys },
              text:  { type: 'string' },
            },
            required: ['voice', 'text'],
          },
        },
        scene_complete: {
          type: 'boolean',
          description: 'Set true if this beat naturally closes the scene (e.g. the character has departed). Optional; defaults to false.',
        },
      },
      required: ['segments'],
    },
  };
}

// ============================================================
// State
// ============================================================
const state = {
  storytellerMessages: [],   // running messages array for storyteller
  lastToolUseId: null,
};

// ============================================================
// API
// ============================================================
async function callClaude(body) {
  const r = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${r.status}`);
  }
  return r.json();
}

async function callStoryteller(beatInstruction) {
  // Append the new user message. If a prior tool_use exists, ack it via tool_result.
  if (state.lastToolUseId) {
    state.storytellerMessages.push({
      role: 'user',
      content: [
        { type: 'tool_result', tool_use_id: state.lastToolUseId, content: 'ok' },
        { type: 'text', text: beatInstruction },
      ],
    });
  } else {
    state.storytellerMessages.push({ role: 'user', content: beatInstruction });
  }

  const result = await callClaude({
    system: event.storytellerSystem,
    messages: state.storytellerMessages,
    max_tokens: 2000,
    tools: [EMIT_BEAT_TOOL],
    tool_choice: { type: 'tool', name: 'emit_beat' },
  });

  const toolUse = result.content.find(b => b.type === 'tool_use');
  if (!toolUse) throw new Error('Storyteller did not emit a beat');

  state.storytellerMessages.push({ role: 'assistant', content: result.content });
  state.lastToolUseId = toolUse.id;

  renderDebug();
  return {
    segments: toolUse.input.segments,
    sceneComplete: !!toolUse.input.scene_complete,
  };
}

async function callTool({ system, userMessage, tool, max_tokens = 200 }) {
  const result = await callClaude({
    system,
    messages: [{ role: 'user', content: userMessage }],
    max_tokens,
    tools: [tool],
    tool_choice: { type: 'tool', name: tool.name },
  });
  const toolUse = result.content.find(b => b.type === 'tool_use');
  if (!toolUse) throw new Error(`Tool "${tool.name}" did not return a result`);
  return toolUse.input;
}

// ============================================================
// TTS — browser speechSynthesis
// ============================================================
const NARRATOR_CONFIG = {
  key: 'narrator',
  displayName: 'Narrator',
  browserPrefs: ['Samantha', 'Karen', 'Moira', 'Tessa', 'Serena', 'Google UK English Female', 'Google US English'],
  pitch: 1.0,
  rate: 1.0,
  elevenLabsId: 'flHkNRp1BlvT73UL6gyz',
  volume: 1.0,
};

// Set by loadEvent() once the user picks an event.
let VOICE_CONFIGS = [NARRATOR_CONFIG];
let VOICE_BY_KEY = { narrator: NARRATOR_CONFIG };
let VOICE_MAP = { narrator: null };

const synth = window.speechSynthesis;
let voicesReady = false;

function loadVoices() {
  return new Promise(resolve => {
    const v = synth.getVoices();
    if (v.length > 0) {
      voicesReady = true;
      pickVoices(v);
      populateVoiceDropdowns(v);
      resolve();
    } else {
      synth.addEventListener('voiceschanged', () => {
        const vv = synth.getVoices();
        voicesReady = true;
        pickVoices(vv);
        populateVoiceDropdowns(vv);
        resolve();
      }, { once: true });
    }
  });
}

function pickVoices(all) {
  const en = all.filter(v => v.lang.startsWith('en'));
  const findByName = (names) => {
    for (const n of names) {
      const v = en.find(v => v.name.toLowerCase().includes(n.toLowerCase()));
      if (v) return v;
    }
    return null;
  };
  const used = new Set();
  for (const cfg of VOICE_CONFIGS) {
    let v = findByName(cfg.browserPrefs);
    if (!v || used.has(v)) {
      v = en.find(x => !used.has(x)) || all.find(x => !used.has(x)) || all[0];
    }
    VOICE_MAP[cfg.key] = v;
    if (v) used.add(v);
  }
}

function populateVoiceDropdowns(all) {
  const en = all.filter(v => v.lang.startsWith('en'));
  const list = en.length > 0 ? en : all;
  const controls = document.querySelector('.tts-controls');
  // Remove any existing per-voice dropdowns; rebuild from VOICE_CONFIGS.
  controls.querySelectorAll('select.voice-select').forEach(s => s.remove());
  for (const cfg of VOICE_CONFIGS) {
    const sel = document.createElement('select');
    sel.id = 'voice-' + cfg.key;
    sel.title = `${cfg.displayName} voice`;
    sel.className = 'voice-select';
    for (const v of list) {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v === VOICE_MAP[cfg.key]) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.onchange = () => {
      VOICE_MAP[cfg.key] = list.find(v => v.name === sel.value);
    };
    controls.appendChild(sel);
  }
  syncVoiceDropdownVisibility();
}

const elAudioCache = new Map(); // `${voiceId}::${text}` -> blob URL

function speakBrowser(text, voiceKey) {
  return new Promise(resolve => {
    const cfg = VOICE_BY_KEY[voiceKey] || NARRATOR_CONFIG;
    const utter = new SpeechSynthesisUtterance(text);
    if (VOICE_MAP[voiceKey]) utter.voice = VOICE_MAP[voiceKey];
    utter.pitch = cfg.pitch ?? 1.0;
    utter.rate = cfg.rate ?? 1.0;
    utter.volume = cfg.volume ?? 1.0;
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    synth.speak(utter);
  });
}

async function speakElevenLabs(text, voiceKey) {
  const cfg = VOICE_BY_KEY[voiceKey];
  const voiceId = cfg && cfg.elevenLabsId;
  if (!voiceId) return;
  const cacheKey = `${voiceId}::${text}`;
  let blobUrl = elAudioCache.get(cacheKey);
  if (!blobUrl) {
    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voice_id: voiceId, text }),
    });
    if (!resp.ok) {
      console.error(`[ElevenLabs] HTTP ${resp.status}`);
      return;
    }
    const blob = await resp.blob();
    blobUrl = URL.createObjectURL(blob);
    elAudioCache.set(cacheKey, blobUrl);
  }
  return new Promise(resolve => {
    const audio = new Audio(blobUrl);
    audio.volume = (VOICE_BY_KEY[voiceKey]?.volume) ?? 1.0;
    audio.onended = () => resolve();
    audio.onerror = () => resolve();
    audio.play().catch(() => resolve());
  });
}

function speak(text, voiceKey) {
  const mode = document.getElementById('tts-mode').value;
  if (mode === 'off') return Promise.resolve();
  if (mode === 'elevenlabs') return speakElevenLabs(text, voiceKey);
  return speakBrowser(text, voiceKey);
}

async function playSegments(segmentEls) {
  for (const { el, voice, text } of segmentEls) {
    el.classList.add('speaking');
    await speak(text, voice);
    el.classList.remove('speaking');
  }
}

// ============================================================
// Render
// ============================================================
function renderBeat(segments) {
  const beatDiv = document.createElement('div');
  beatDiv.className = 'beat';
  const segmentEls = [];
  for (const seg of segments) {
    const segDiv = document.createElement('div');
    segDiv.className = `segment voice-${seg.voice}`;
    let display = seg.text;
    if (seg.voice !== 'narrator') {
      // Character speech: strip any pre-existing leading/trailing quotes the model
      // may have added, then wrap in curly quotes for display. TTS still receives raw seg.text.
      const stripped = seg.text.replace(/^["“”'']+|["“”'']+$/g, '').trim();
      display = `“${stripped}”`;
    }
    segDiv.textContent = display;
    beatDiv.appendChild(segDiv);
    segmentEls.push({ el: segDiv, voice: seg.voice, text: seg.text });
  }
  document.getElementById('beats').appendChild(beatDiv);
  beatDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return segmentEls;
}

function renderDebug() {
  const el = document.getElementById('debug');
  el.textContent = JSON.stringify(state.storytellerMessages, null, 2) || '(empty)';
}

function setPhone(html) {
  document.getElementById('phone-content').innerHTML = html;
}

function setPhoneLoading(text) {
  setPhone(`<div class="loading">${text}</div>`);
}

function setPhoneError(msg) {
  setPhone(`<div class="error">${msg}</div><div class="actions"><button id="restart">Reset</button></div>`);
  document.getElementById('restart').onclick = () => location.reload();
}

// ============================================================
// Engine — passed to the event's run() function
// ============================================================
function askText({ prompt, placeholder = '' }) {
  return new Promise(resolve => {
    setPhone(`
      <div class="prompt">${prompt}</div>
      <input type="text" id="ask-text-input" placeholder="${placeholder}" autocomplete="off">
      <div class="actions">
        <button id="ask-text-submit">Send</button>
      </div>
    `);
    const input = document.getElementById('ask-text-input');
    const submit = () => {
      const text = input.value.trim();
      if (!text) return;
      resolve(text);
    };
    input.focus();
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    document.getElementById('ask-text-submit').onclick = submit;
  });
}

function endScene(summaryHtml, outcomeId) {
  setPhone(`
    <div class="outcome outcome-${outcomeId}">${summaryHtml}</div>
    <div class="actions"><button id="restart">Run again</button></div>
  `);
  document.getElementById('restart').onclick = () => location.reload();
}

const engine = {
  player: PLAYER,
  callStoryteller,
  callTool,
  renderBeat,
  playSegments,
  setPhone,
  setPhoneLoading,
  setPhoneError,
  askText,
  end: endScene,
  removeItem(name) {
    PLAYER.inventory = PLAYER.inventory.filter(i => i !== name);
  },
  addItem(name) {
    PLAYER.inventory.push(name);
  },
  replaceItem(oldName, newName) {
    PLAYER.inventory = PLAYER.inventory.map(i => (i === oldName ? newName : i));
  },
};

// ============================================================
// Boot
// ============================================================
async function loadEvent(path) {
  const mod = await import(path);
  event = mod.default;
  document.title = event.title;
  VOICE_CONFIGS = [NARRATOR_CONFIG, ...event.characters];
  VOICE_BY_KEY = Object.fromEntries(VOICE_CONFIGS.map(c => [c.key, c]));
  VOICE_MAP = Object.fromEntries(VOICE_CONFIGS.map(c => [c.key, null]));
  EMIT_BEAT_TOOL = buildEmitBeatTool(VOICE_CONFIGS.map(c => c.key));
  await loadVoices();
}

const ttsModeEl = document.getElementById('tts-mode');
function syncVoiceDropdownVisibility() {
  const showBrowserVoices = ttsModeEl.value === 'browser';
  document.querySelectorAll('select.voice-select').forEach(sel => {
    sel.style.display = showBrowserVoices ? '' : 'none';
  });
}
ttsModeEl.addEventListener('change', syncVoiceDropdownVisibility);
syncVoiceDropdownVisibility();

document.getElementById('player-name').textContent = PLAYER.name;

function showEventPicker() {
  const options = EVENTS
    .map(e => `<option value="${e.path}">${e.label}</option>`)
    .join('');
  setPhone(`
    <div class="prompt">Choose an event:</div>
    <select id="event-pick" style="width:100%;padding:11px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px;font-family:inherit;">${options}</select>
    <div class="actions"><button id="begin">Begin event</button></div>
  `);
  document.getElementById('begin').onclick = async () => {
    const path = document.getElementById('event-pick').value;
    setPhoneLoading('Loading event…');
    try {
      await loadEvent(path);
      await event.run(engine);
    } catch (e) {
      setPhoneError(`Error: ${e.message}`);
    }
  };
}

showEventPicker();
</script>
</body>
</html>

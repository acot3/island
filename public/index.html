<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="layout">
    <div id="main">
      <div id="narration" class="panel">
        <div class="panel-label">NARRATION</div>
        <div id="tts-toggle" class="tts-toggle on">sound on</div>
        <div id="narration-content">
          <h1>ISLAND</h1>
          <p>A survival story.</p>
          <button id="btn-create">Create Game</button>
        </div>
      </div>
      <div id="debug-wrapper">
        <div id="debug-toggle" class="panel-label">Show Debug Console</div>
        <div id="debug" class="panel" style="display:none;"></div>
      </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
